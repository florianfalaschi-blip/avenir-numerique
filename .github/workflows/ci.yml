name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # === Étapes qui doivent passer ===

      - name: Test core package
        run: pnpm --filter @avenir/core test

      # === Étapes informatives (n'échouent pas le job) ===

      - name: Type-check core (info only)
        run: pnpm --filter @avenir/core type-check
        continue-on-error: true

      - name: Lint all (info only)
        run: pnpm lint
        continue-on-error: true